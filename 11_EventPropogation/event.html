<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Propogation</title>
  </head>
  <style>
    div {
      border: 1px solid black;
      padding: 20px;
    }
  </style>
  <body>
    <div id="box1">
      container1
      <div id="box2">
        container2
        <div id="box3">container3</div>
      </div>
    </div>
  </body>
  <script>
    let box1 = document.getElementById('box1');
    let box2 = document.getElementById('box2');
    let box3 = document.getElementById('box3');

    box1.addEventListener('click',function () {
        console.log('box 1 is clicked');
    },true)
    box2.addEventListener('click',function () {
        console.log('box 2 is clicked');
    })
    box3.addEventListener('click',function (e) {
        // e.stopPropagation();
        console.log('box 3 is clicked');   
    })

    // Bubbling Event :- target element --> parent element
    // Capturing Event :- parent element --> target element

  </script>
</html>
